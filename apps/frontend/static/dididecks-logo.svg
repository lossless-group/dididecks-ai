  <g filter="url(#textShadow)">
    <text x="800" y="548" fill="#F7FAFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="118" font-weight="760" letter-spacing="-5">DidiDecks</text>
