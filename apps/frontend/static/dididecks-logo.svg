    <path d="M287 408c0-16 13-29 29-29h211c76 0 138 62 138 138v94c0 16-13 29-29 29H316c-16 0-29-13-29-29V408z" fill="url(#layerTwo)" opacity="0.97" transform="rotate(-3 476 510)"/>
  </g>

  <g filter="url(#magentaGlow)">
    <path d="M335 335c0-17.7 14.3-32 32-32h168c105.5 0 191 85.5 191 191v68c0 17.7-14.3 32-32 32H367c-17.7 0-32-14.3-32-32V335z" fill="url(#cyanMagenta)"/>
    <path d="M401 404c0-14.4 11.6-26 26-26h103c64.1 0 116 51.9 116 116v27c0 14.4-11.6 26-26 26H427c-14.4 0-26-11.6-26-26V404z" fill="#071A3C" opacity="0.95"/>
    <path d="M438 429h50c11 0 20 9 20 20v50c0 11-9 20-20 20h-50c-11 0-20-9-20-20v-50c0-11 9-20 20-20z" fill="#2355CA" opacity="0.74"/>
    <path d="M533 435h94c10 0 18 8 18 18v4c0 10-8 18-18 18h-94c-10 0-18-8-18-18v-4c0-10 8-18 18-18z" fill="#2E62D8" opacity="0.7"/>
    <path d="M533 494h94c10 0 18 8 18 18v4c0 10-8 18-18 18h-94c-10 0-18-8-18-18v-4c0-10 8-18 18-18z" fill="#2E62D8" opacity="0.82"/>
    <path d="M533 553h94c10 0 18 8 18 18v4c0 10-8 18-18 18h-94c-10 0-18-8-18-18v-4c0-10 8-18 18-18z" fill="#2E62D8" opacity="0.62"/>
