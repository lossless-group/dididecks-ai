      <path d="M16 12h16a4 4 0 0 1 4 4v16a4 4 0 0 1-4 4H16a4 4 0 0 1-4-4V16a4 4 0 0 1 4-4z"/>
      <path d="M20 20h8v8h-8z"/>
    </g>
